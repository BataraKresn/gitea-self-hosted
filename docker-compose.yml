# =============================================================================
# Gitea Production Stack – Docker Compose Configuration
# Services: Gitea · PostgreSQL 16.3 · Redis 7.2 · Nginx 1.27
# 
# RESTART POLICY: unless-stopped
#   Containers restart on failure but stay stopped after compose down
#
# Commands:
#   docker compose up -d              - Start services
#   docker compose down               - Stop services
#   docker compose restart            - Restart services
#   docker compose up -d --force-recreate  - Recreate containers
#   docker compose logs -f            - View logs
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL – primary database (NOT exposed to host)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16.3-alpine
    container_name: gitea-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: ${TZ}
    volumes:
      - ./postgres-data/pgdata:/var/lib/postgresql/data:Z
    networks:
      - gitea-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ---------------------------------------------------------------------------
  # Redis – cache / session / queue (NOT exposed to host)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: gitea-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly no
      --loglevel warning
    volumes:
      - gitea-redis-data:/data
    networks:
      - gitea-backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 192M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ---------------------------------------------------------------------------
  # Gitea – Git server (HTTP 3000 internal; SSH 22 internal → host 2222)
  # ---------------------------------------------------------------------------
  gitea:
    image: gitea/gitea:1.23.1
    container_name: gitea
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      USER_UID: 1000
      USER_GID: 1000
      TZ: ${TZ}

      # -- Database --
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: db:5432
      GITEA__database__NAME: ${POSTGRES_DB}
      GITEA__database__USER: ${POSTGRES_USER}
      GITEA__database__PASSWD: ${POSTGRES_PASSWORD}
      GITEA__database__SSL_MODE: disable
      GITEA__database__LOG_SQL: "false"
      GITEA__database__MAX_OPEN_CONNS: "20"
      GITEA__database__MAX_IDLE_CONNS: "5"
      GITEA__database__CONN_MAX_LIFETIME: "3m"

      # -- Server --
      GITEA__server__DOMAIN: ${GITEA_DOMAIN}
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL}
      GITEA__server__PROTOCOL: http
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__SSH_DOMAIN: ${GITEA_SSH_DOMAIN}
      # SSH_PORT = port users put in clone URL (external-facing)
      GITEA__server__SSH_PORT: ${GITEA_SSH_PORT}
      # START_SSH_SERVER false = use host SSH forwarded into container
      GITEA__server__START_SSH_SERVER: "false"
      GITEA__server__SSH_LISTEN_PORT: "22"
      GITEA__server__LFS_START_SERVER: "true"
      GITEA__server__REVERSE_PROXY_LIMIT: ${GITEA_REVERSE_PROXY_LIMIT}
      GITEA__server__REVERSE_PROXY_TRUSTED_PROXIES: ${GITEA_TRUSTED_PROXIES}
      GITEA__server__OFFLINE_MODE: "false"
      GITEA__server__LANDING_PAGE: explore

      # -- Security --
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__security__SECRET_KEY: ${GITEA_SECRET_KEY}
      GITEA__security__INTERNAL_TOKEN: ${GITEA_INTERNAL_TOKEN}
      GITEA__security__PASSWORD_HASH_ALGO: argon2
      GITEA__security__MIN_PASSWORD_LENGTH: "12"
      GITEA__security__PASSWORD_COMPLEXITY: lower,upper,digit,spec
      GITEA__security__LOGIN_REMEMBER_DAYS: "7"
      GITEA__security__COOKIE_USERNAME: gitea_awesome
      GITEA__security__DISABLE_QUERY_AUTH_TOKEN: "true"

      # -- OAuth2 / LFS JWT --
      GITEA__oauth2__JWT_SECRET: ${GITEA_JWT_SECRET}
      GITEA__lfs__PATH: /data/git/lfs

      # -- Session (Redis) --
      GITEA__session__PROVIDER: redis
      GITEA__session__PROVIDER_CONFIG: "redis://:${REDIS_PASSWORD}@redis:6379/0?pool_size=10"
      GITEA__session__COOKIE_SECURE: "true"
      GITEA__session__SESSION_LIFE_TIME: "86400"
      GITEA__session__GC_INTERVAL_TIME: "3600"

      # -- Cache (Redis) --
      GITEA__cache__ADAPTER: redis
      GITEA__cache__HOST: "redis://:${REDIS_PASSWORD}@redis:6379/1?pool_size=10"
      GITEA__cache__INTERVAL: "60"

      # -- Queue (Redis) --
      GITEA__queue__TYPE: redis
      GITEA__queue__CONN_STR: "redis://:${REDIS_PASSWORD}@redis:6379/2"
      GITEA__queue__LENGTH: "1000"
      GITEA__queue__BATCH_LENGTH: "20"

      # -- Service --
      GITEA__service__DISABLE_REGISTRATION: ${GITEA_DISABLE_REGISTRATION}
      GITEA__service__REQUIRE_SIGNIN_VIEW: "true"
      GITEA__service__ENABLE_NOTIFY_MAIL: "false"
      GITEA__service__REGISTER_EMAIL_CONFIRM: "false"
      GITEA__service__DEFAULT_KEEP_EMAIL_PRIVATE: "true"
      GITEA__service__SHOW_REGISTRATION_BUTTON: "false"
      GITEA__service__ALLOW_ONLY_EXTERNAL_REGISTRATION: "false"
      GITEA__service__ENABLE_PASSWORD_SIGNIN_FORM: "true"

      # -- Repository --
      GITEA__repository__DEFAULT_PRIVATE: private
      GITEA__repository__ENABLE_PUSH_CREATE_USER: "false"
      GITEA__repository__ENABLE_PUSH_CREATE_ORG: "false"
      GITEA__repository__MAX_CREATION_LIMIT: "-1"
      GITEA__repository__DEFAULT_BRANCH: main

      # -- Attachments --
      GITEA__attachment__MAX_SIZE: "50"
      GITEA__attachment__MAX_FILES: "10"
      GITEA__attachment__ALLOWED_TYPES: "image/jpeg|image/png|image/gif|image/webp|application/zip|application/gzip|text/plain|application/pdf"

      # -- Log --
      GITEA__log__MODE: console
      GITEA__log__LEVEL: info
      GITEA__log__ROOT_PATH: /data/gitea/log

      # -- Cron --
      GITEA__cron__ENABLED: "true"
      GITEA__cron__RUN_AT_START: "false"

    volumes:
      - ./gitea-data:/data:Z
      - ./log:/var/log/gitea:Z
    ports:
      # SSH Git – exposed to host on port 2222 (or 22 if reconfigured; see README)
      - "${GITEA_SSH_BIND_IP}:${GITEA_SSH_PORT}:22"
      # HTTP – NOT exposed directly; traffic routed through Nginx
    networks:
      - gitea-backend
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/-/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Nginx – reverse proxy (port 80 only; SSL terminated upstream by NPM/Cloudflare)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: gitea-nginx
    restart: unless-stopped
    depends_on:
      gitea:
        condition: service_healthy
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ./nginx/gitea.conf:/etc/nginx/conf.d/gitea.conf:ro
      - ./nginx/proxy_params.inc:/etc/nginx/conf.d/proxy_params.inc:ro
      - ./log/nginx:/var/log/nginx:Z
    networks:
      - gitea-backend
      - gitea-frontend
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health-check 2>/dev/null || wget -qO- http://localhost/health-check > /dev/null 2>&1 || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# =============================================================================
# Networks
# =============================================================================
networks:
  # Internal: gitea ↔ db ↔ redis
  gitea-backend:
    name: gitea-backend
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.0.0/24
  # External: nginx faces the internet
  gitea-frontend:
    name: gitea-frontend
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  gitea-redis-data:
    name: gitea-redis-data
