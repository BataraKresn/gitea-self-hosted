# =============================================================================
# Nginx – Gitea Reverse Proxy (Production)
# Domain : git.company.id
# SSL    : /etc/nginx/certs/fullchain.pem + privkey.pem
#          (Let's Encrypt, internal CA, or Cloudflare origin cert)
# =============================================================================

# ── Rate limiting zones ─────────────────────────────────────────────────────
# Limit login endpoint to reduce brute-force exposure
limit_req_zone $binary_remote_addr zone=gitea_login:10m rate=5r/m;
# General API rate limit
limit_req_zone $binary_remote_addr zone=gitea_api:10m   rate=30r/m;

# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Upstream ─────────────────────────────────────────────────────────────────
upstream gitea_backend {
    server gitea:3000;
    keepalive 32;
}

# ── HTTP Proxy (SSL terminated by NPM / Cloudflare upstream) ─────────────────
# server_name _ + default_server: catch all requests regardless of hostname
# NPM can point to this server using IP:80, no domain matching needed
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ── Upload / timeout limits ────────────────────────────────────────────
    client_max_body_size    512m;
    client_body_timeout     120s;
    client_header_timeout   30s;
    send_timeout            120s;
    keepalive_timeout       75s;

    # ── Proxy timeouts ─────────────────────────────────────────────────────
    proxy_connect_timeout   30s;
    proxy_send_timeout      300s;
    proxy_read_timeout      300s;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options        DENY    always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Health probe ───────────────────────────────────────────────────────
    location = /health-check {
        return 200 "ok\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    # ── Rate limit login endpoint ──────────────────────────────────────────
    location = /user/login {
        limit_req zone=gitea_login burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://gitea_backend;
        include /etc/nginx/conf.d/proxy_params.inc;
    }

    # ── Rate limit API ─────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=gitea_api burst=60 nodelay;
        limit_req_status 429;
        proxy_pass http://gitea_backend;
        include /etc/nginx/conf.d/proxy_params.inc;
    }

    # ── Git smart HTTP ─────────────────────────────────────────────────────
    location ~ ^/.+\.git/(info/refs|git-upload-pack|git-receive-pack)$ {
        proxy_pass         http://gitea_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        client_max_body_size  1g;
    }

    # ── Everything else ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://gitea_backend;
        include            /etc/nginx/conf.d/proxy_params.inc;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
    }

    # ── Logging ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/gitea.access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/gitea.error.log  warn;
}
