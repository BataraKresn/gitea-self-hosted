# =============================================================================
# Nginx – Gitea Reverse Proxy (Production)
# Domain : git.company.id
# SSL    : /etc/nginx/certs/fullchain.pem + privkey.pem
#          (Let's Encrypt, internal CA, or Cloudflare origin cert)
# =============================================================================

# ── Rate limiting zones ─────────────────────────────────────────────────────
# Limit login endpoint to reduce brute-force exposure
limit_req_zone $binary_remote_addr zone=gitea_login:10m rate=5r/m;
# General API rate limit
limit_req_zone $binary_remote_addr zone=gitea_api:10m   rate=30r/m;

# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Upstream ─────────────────────────────────────────────────────────────────
upstream gitea_backend {
    server gitea:3000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name git.company.id;

    # ACME challenge passthrough (comment out if not using Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Lightweight health probe endpoint for Docker healthcheck
    location = /health-check {
        return 200 "ok\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name git.company.id;

    # ── SSL Certificates ───────────────────────────────────────────────────
    # Option A – Let's Encrypt / Certbot (most common):
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Current local cert/key for this deployment:
    ssl_certificate     /etc/nginx/certs/_mugshot_dev.pem;
    ssl_certificate_key /etc/nginx/certs/_mugshot_dev.key;

    # Option B – Cloudflare Origin Certificate:
    # ssl_certificate     /etc/nginx/certs/cloudflare-origin.pem;
    # ssl_certificate_key /etc/nginx/certs/cloudflare-origin.key;

    # Option C – Internal CA / self-signed:
    # ssl_certificate     /etc/nginx/certs/gitea-selfsigned.crt;
    # ssl_certificate_key /etc/nginx/certs/gitea-selfsigned.key;

    # ── TLS hardening ──────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP Stapling (only works with public CA certs like Let's Encrypt)
    # ssl_stapling         on;
    # ssl_stapling_verify  on;
    # resolver             8.8.8.8 1.1.1.1 valid=300s;
    # resolver_timeout     5s;

    # ── Security headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                      always;
    add_header X-Content-Type-Options    nosniff                   always;
    add_header X-XSS-Protection          "1; mode=block"           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # ── Upload / timeout limits ────────────────────────────────────────────
    # Allow large Git pushes (LFS objects, big repos)
    client_max_body_size    512m;
    client_body_timeout     120s;
    client_header_timeout   30s;

    # Long-running Git push/pull operations
    send_timeout            120s;
    keepalive_timeout       75s;

    # ── Proxy timeouts (critical for large git operations) ─────────────────
    proxy_connect_timeout   30s;
    proxy_send_timeout      300s;
    proxy_read_timeout      300s;

    # ── Health probe (internal Docker use) ────────────────────────────────
    location = /health-check {
        return 200 "ok\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    # ── Rate limit login endpoint ──────────────────────────────────────────
    location = /user/login {
        limit_req zone=gitea_login burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://gitea_backend;
        include /etc/nginx/conf.d/proxy_params.inc;
    }

    # ── Rate limit API ─────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=gitea_api burst=60 nodelay;
        limit_req_status 429;
        proxy_pass http://gitea_backend;
        include /etc/nginx/conf.d/proxy_params.inc;
    }

    # ── Git smart HTTP (info/refs, git-upload-pack, git-receive-pack) ──────
    location ~ ^/.+\.git/(info/refs|git-upload-pack|git-receive-pack)$ {
        proxy_pass         http://gitea_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        # Git pack operations can be large and slow; increase timeouts
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        client_max_body_size  1g;
    }

    # ── Everything else ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://gitea_backend;
        include            /etc/nginx/conf.d/proxy_params.inc;
        # WebSocket support (used by Gitea for some live features)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
    }

    # ── Logging ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/gitea.access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/gitea.error.log  warn;
}
